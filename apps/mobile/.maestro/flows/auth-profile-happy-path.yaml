appId: com.dinoderek.mobile
---
- openLink: "mobile://maestro-harness?reset=data&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible:
    id: "session-list-screen"
- takeScreenshot: "05-auth-profile-logged-out-start"
- tapOn:
    id: "top-level-settings-button"
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "settings-profile-row"
- assertVisible:
    id: "profile-signed-out-card"
- tapOn:
    id: "profile-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "profile-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "profile-sign-in-button"
- assertVisible:
    id: "profile-signed-in-card"
- takeScreenshot: "06-auth-profile-signed-in"
- tapOn:
    id: "profile-edit-button"
- tapOn:
    id: "profile-username-input"
- eraseText: 120
- inputText: "${MAESTRO_AUTH_PROFILE_USERNAME}"
- tapOn:
    id: "profile-signed-in-card"
- tapOn:
    id: "profile-update-button"
- assertVisible:
    id: "profile-update-feedback"
- assertVisible: "Profile updated."
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
- tapOn:
    id: "profile-sign-out-button"
- assertVisible:
    id: "profile-signed-out-card"
- takeScreenshot: "07-auth-profile-signed-out-end"
