appId: com.dinoderek.mobile
---
- openLink: "mobile://maestro-harness?reset=data&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible:
    id: "session-list-screen"
- takeScreenshot: "03-data-runtime-smoke-start"
- openLink: "mobile://maestro-harness?reset=data&teleport=session-recorder"
- tapOn:
    text: "Open"
    optional: true
- assertVisible:
    id: "session-recorder-screen"
- tapOn:
    text: "Continue"
    optional: true
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "squat"
- hideKeyboard
- tapOn:
    point: "50%,26%"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "135"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "8"
- tapOn: "Submit Session"
- tapOn:
    text: "Submit Session"
    optional: true
- tapOn:
    text: "Remove incomplete sets and submit"
    optional: true
- tapOn:
    text: "Remove empty exercises and submit"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible:
    id: "session-list-screen"
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- assertVisible:
    id: "completed-history-scroll"
- takeScreenshot: "04-data-runtime-smoke-success"
